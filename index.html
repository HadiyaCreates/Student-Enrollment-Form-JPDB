<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Enrollment Form - JPDB</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
    <div class="page-header text-center">
        <h2>Student Enrollment Form (JsonPowerDB)</h2>
    </div>
    <form id="studentForm" method="get">
        <div class="form-group">
            <label>Roll No (Primary Key): </label>
            <input type="text" class="form-control" id="rollNo" onchange="checkStudentExists()" placeholder="Enter Roll Number" required>
        </div>
        <div class="form-group">
            <label>Full Name: </label>
            <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name" disabled>
        </div>
        <div class="form-group">
            <label>Class: </label>
            <input type="text" class="form-control" id="className" placeholder="Enter Class" disabled>
        </div>
        <div class="form-group">
            <label>Birth Date: </label>
            <input type="date" class="form-control" id="birthDate" disabled>
        </div>
        <div class="form-group">
            <label>Address: </label>
            <input type="text" class="form-control" id="address" placeholder="Enter Address" disabled>
        </div>
        <div class="form-group">
            <label>Enrollment Date: </label>
            <input type="date" class="form-control" id="enrollDate" disabled>
        </div>
        
        <div class="form-group text-center">
            <button type="button" class="btn btn-lg btn-primary" id="save" onclick="saveData()" disabled>Save</button>
            <button type="button" class="btn btn-lg btn-primary" id="update" onclick="updateData()" disabled>Update</button>
            <button type="button" class="btn btn-lg btn-default" id="reset" onclick="resetForm()" disabled>Reset</button>
        </div>
    </form>
</div>

<script type="text/javascript" src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
<script type="text/javascript" src="/index.js"></script>
</body>
</html>
